server:
  port: 8082
  tomcat:
    max-part-count: 1000

spring:
  application:
    name: course-service

  profiles:
    active: dev

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
      resolve-lazily: true

logging:
  level:
    root: info
    dev.marvin.courseservice: debug


